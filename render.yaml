services:
  - type: web
    name: careeragent-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: AUTH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MAX_TARGET_JOBS_PER_RUN
        value: "25"
      - key: RATE_LIMIT_RUNS_PER_HOUR
        value: "5"
      - key: RATE_LIMIT_TAILOR_PER_HOUR
        value: "10"
